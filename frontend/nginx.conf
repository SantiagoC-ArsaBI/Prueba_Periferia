server {
    listen 5173;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — resuelve upstreams en tiempo de request, no en startup
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API al backend (evita CORS cuando el navegador accede por localhost:5173)
    location /api/auth/ {
        set $auth_upstream http://auth-service:3001;
        proxy_pass $auth_upstream/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/users/ {
        set $user_upstream http://user-service:3002;
        proxy_pass $user_upstream/users/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/posts/ {
        set $post_upstream http://post-service:3003;
        proxy_pass $post_upstream/posts/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # WebSocket (likes en tiempo real) — socket.io con path /likes
    location /likes/ {
        set $ws_upstream http://post-service:3003;
        proxy_pass $ws_upstream/likes/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
